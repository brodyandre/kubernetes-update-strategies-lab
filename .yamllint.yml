---
extends: default

rules:
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  commas:
    min-spaces-after: 1
    max-spaces-before: 0
  document-end: disable
  document-start:
    present: true
  empty-lines:
    max: 1
    max-start: 0
    max-end: 0
  hyphens:
    max-spaces-after: 1
  line-length:
    max: 140
    level: warning
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false
  truthy:
    allowed-values: ["true", "false"]
    check-keys: false
