<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Estrategia Blue Green executada</title>
  <desc id="desc">Placeholder versionado para a evidencia da estrategia Blue Green.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="64" y="64" width="1152" height="592" rx="28" fill="#06111a" stroke="#86efac" stroke-width="4"/>
  <rect x="96" y="96" width="360" height="10" rx="5" fill="#22c55e"/>
  <text x="96" y="188" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Estrategia Blue Green executada</text>
  <text x="96" y="248" fill="#bbf7d0" font-family="Segoe UI, Arial, sans-serif" font-size="30">Placeholder para a troca de trafego entre ambientes</text>
  <text x="96" y="320" fill="#dcfce7" font-family="Segoe UI, Arial, sans-serif" font-size="26">Substitua por uma captura dos Services e Endpoints apos o switch.</text>
  <text x="96" y="394" fill="#86efac" font-family="Consolas, Monaco, monospace" font-size="28">Comando sugerido: kubectl get svc,endpoints -n update-strategies</text>
  <text x="96" y="500" fill="#bef264" font-family="Segoe UI, Arial, sans-serif" font-size="24">Essa evidencia ajuda a mostrar preview, ambiente ativo e rollback rapido.</text>
</svg>
