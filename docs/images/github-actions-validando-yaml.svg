  <text x="96" y="394" fill="#a5b4fc" font-family="Consolas, Monaco, monospace" font-size="28">Contexto sugerido: execucao bem-sucedida em push ou pull request</text>
  <text x="96" y="500" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="24">A imagem ideal mostra status green, workflow, commit e branch avaliados.</text>
