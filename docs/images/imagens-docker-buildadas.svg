<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Imagens Docker buildadas</title>
  <desc id="desc">Placeholder versionado para a evidencia das imagens Docker buildadas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="64" y="64" width="1152" height="592" rx="28" fill="#07121f" stroke="#67e8f9" stroke-width="4"/>
  <rect x="96" y="96" width="320" height="10" rx="5" fill="#22d3ee"/>
  <text x="96" y="188" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">Imagens Docker buildadas</text>
  <text x="96" y="248" fill="#cffafe" font-family="Segoe UI, Arial, sans-serif" font-size="30">Placeholder para a etapa de build local</text>
  <text x="96" y="320" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="26">Troque por uma captura da listagem das imagens blue e green.</text>
  <text x="96" y="394" fill="#67e8f9" font-family="Consolas, Monaco, monospace" font-size="28">Comando sugerido: docker images update-demo-*</text>
  <text x="96" y="500" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="24">Ideal para exibir tags, tamanho e data de criacao das imagens.</text>
</svg>
