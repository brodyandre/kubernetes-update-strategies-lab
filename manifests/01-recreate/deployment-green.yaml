---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recreate-demo
  namespace: update-strategies
  labels:
    app: recreate-demo
    version: green
    strategy: recreate
    track: stable
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: recreate-demo
  template:
    metadata:
      labels:
        app: recreate-demo
        version: green
        strategy: recreate
        track: stable
    spec:
      containers:
        - name: web
          image: update-demo-green:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
