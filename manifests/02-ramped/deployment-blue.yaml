---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramped-demo
  namespace: update-strategies
  labels:
    app: ramped-demo
    version: blue
    strategy: ramped
    track: stable
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: ramped-demo
  template:
    metadata:
      labels:
        app: ramped-demo
        version: blue
        strategy: ramped
        track: stable
    spec:
      containers:
        - name: web
          image: update-demo-blue:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
