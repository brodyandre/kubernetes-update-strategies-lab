---
apiVersion: v1
kind: Service
metadata:
  name: blue-green-active
  namespace: update-strategies
  labels:
    app: blue-green-demo
    strategy: blue-green
    track: active
spec:
  type: ClusterIP
  selector:
    app: blue-green-demo
    version: blue
  ports:
    - name: http
      port: 80
      targetPort: http
