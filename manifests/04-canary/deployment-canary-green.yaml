---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-green
  namespace: update-strategies
  labels:
    app: canary-demo
    version: green
    strategy: canary
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary-demo
      version: green
      track: canary
  template:
    metadata:
      labels:
        app: canary-demo
        version: green
        strategy: canary
        track: canary
    spec:
      containers:
        - name: web
          image: update-demo-green:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
