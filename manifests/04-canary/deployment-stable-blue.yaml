---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary-stable-blue
  namespace: update-strategies
  labels:
    app: canary-demo
    version: blue
    strategy: canary
    track: stable
spec:
  replicas: 4
  selector:
    matchLabels:
      app: canary-demo
      version: blue
      track: stable
  template:
    metadata:
      labels:
        app: canary-demo
        version: blue
        strategy: canary
        track: stable
    spec:
      containers:
        - name: web
          image: update-demo-blue:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
